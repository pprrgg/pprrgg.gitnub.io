<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        .hero {
            position: relative;
            height: 100%;
            background-image: url('img1.png'); /* Reemplaza con la URL de tu imagen */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.998), rgba(255, 255, 255, 0.5));
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .hero .btn {
            padding: 0.75rem 2rem;
            font-size: 1rem;
            color: white;
            background-color: #9c27b0;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .hero .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="hero-content">
            <h1>Bienvenido a DocTec.blog</h1>
            <p>Este es mi rincón personal donde subo plantillas de documentos técnicos que he ido creando a lo largo del tiempo. Si te dedicas a la ingeniería, la energía solar o la eficiencia energética, puede que encuentres algo útil por aquí.</p>
            <a href="https://calculadoradeahorroenergetico.duckdns.org/" class="btn">Ver más</a>
        </div>
    </div>
</body>
</html>
